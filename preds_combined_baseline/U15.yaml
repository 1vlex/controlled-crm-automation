dsl: v0.3
flow: manual_template
vars: {}
steps:
- id: create_fixture
  op: deal.create
  input:
    title: Manual QA Deal Beta
    budget: 38000
    force_create: true
- id: search_deal
  op: deal.search
  input:
    title: Manual QA Deal Betta
- id: update_stage
  op: deal.update_stage
  input:
    deal: ${search_deal.deal_id}
    stage: Proposotion
    probability: 65
- id: create_activity
  op: activity.create
  input:
    deal: ${search_deal.deal_id}
    type: Call
    summary: Send proposal draft
    due: tomorrow 13:00
