dsl: v0.3
flow: eval_aligned_s21
vars: {}
steps:
- id: s1_report
  op: report.sales_daily
  input:
    period: today
    group_by: salesperson
- id: s2_export
  op: report.export
  input:
    format: pdf
- id: s3_email
  op: notify.email
  input:
    to: director@example.com
    subject: Auto notification S21
    attach: ${file.path}
