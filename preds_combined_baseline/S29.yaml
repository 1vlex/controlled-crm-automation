dsl: v0.3
flow: eval_aligned_s29
vars: {}
steps:
- id: s1_contact
  op: contact.find_or_create
  input:
    email: scenario29@example.com
- id: s2_deal
  op: deal.create
  input:
    title: Scenario Deal S29
    budget: 63500
    force_create: true
- id: s3_activity
  op: activity.create
  input:
    type: To Do
    summary: Follow up with client
    due: tomorrow
    deal: ${s2_deal.id}
- id: s4_quotation
  op: deal.create_quotation
  input:
    deal: ${s2_deal.id}
    amount: 63500
- id: s5_email
  op: notify.email
  input:
    to: director@example.com
    subject: Auto notification S29
    attach: ${quotation.pdf_path}
