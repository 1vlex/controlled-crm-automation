dsl: v0.3
flow: eval_aligned_s11
vars: {}
steps:
- id: s1_contact
  op: contact.find_or_create
  input:
    email: scenario11@example.com
- id: s2_deal
  op: deal.create
  input:
    title: Scenario Deal S11
    budget: 36500
    force_create: true
- id: s3_activity
  op: activity.create
  input:
    type: To Do
    summary: Follow up with client
    due: tomorrow
    deal: ${s2_deal.id}
- id: s4_email
  op: notify.email
  input:
    to: director@example.com
    subject: Auto notification S11
