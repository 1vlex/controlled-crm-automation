dsl: v0.3
flow: manual_template
vars: {}
steps:
- id: search_deal
  op: deal.search
  input:
    title: 'Global Solutons: Furnitures'
- id: update_stage
  op: deal.update_stage
  input:
    deal: ${search_deal.deal_id}
