dsl: v0.3
flow: eval_aligned_s27
vars: {}
steps:
- id: s1_contact
  op: contact.find_or_create
  input:
    email: scenario27@example.com
- id: s2_deal
  op: deal.create
  input:
    title: Scenario Deal S27
    budget: 60500
    force_create: true
- id: s3_tags
  op: deal.add_tags
  input:
    deals:
    - ${s2_deal.id}
    tags:
    - risk
    - followup
- id: s4_email
  op: notify.email
  input:
    to: director@example.com
    subject: Auto notification S27
