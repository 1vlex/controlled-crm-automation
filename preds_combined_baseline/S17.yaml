dsl: v0.3
flow: eval_aligned_s17
vars: {}
steps:
- id: s1_contact
  op: contact.find_or_create
  input:
    email: scenario17@example.com
- id: s2_deal
  op: deal.create
  input:
    title: Scenario Deal S17
    budget: 45500
    force_create: true
- id: s3_stale
  op: deal.search_stale
  input:
    days_inactive: 0
    stages: []
- id: s4_owner
  op: deal.update
  input:
    deals: ${deals}
    salesperson: galiy.ivan2003@mail.r
