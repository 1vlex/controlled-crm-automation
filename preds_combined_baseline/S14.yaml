dsl: v0.3
flow: eval_aligned_s14
vars: {}
steps:
- id: s1_contact
  op: contact.find_or_create
  input:
    email: scenario14@example.com
- id: s2_deal
  op: deal.create
  input:
    title: Scenario Deal S14
    budget: 41000
    force_create: true
- id: s3_stage
  op: deal.update_stage
  input:
    deal: ${s2_deal.id}
    stage: Neww
    probability: 100
- id: s4_watchdog
  op: watchdog
  input:
    deal: ${s2_deal.id}
    condition: deal.status == 'won'
