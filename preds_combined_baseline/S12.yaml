dsl: v0.3
flow: eval_aligned_s12
vars: {}
steps:
- id: s1_contact
  op: contact.find_or_create
  input:
    email: scenario12@example.com
- id: s2_deal
  op: deal.create
  input:
    title: Scenario Deal S12
    budget: 38000
    force_create: true
- id: s3_search_deals
  op: deal.search
  input:
    min_budget: 30000
- id: s4_tags
  op: deal.add_tags
  input:
    deals: ${deals}
    tags:
    - urgent
- id: s5_activity
  op: activity.create
  input:
    type: To Do
    summary: Follow up with client
    due: tomorrow
    deals: ${deals}
